name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build:browser

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify deployed pages are accessible
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          base="${PAGE_URL%/}"
          fail=0
          for page in index.html documentation.html visualizer.html; do
            url="$base/$page"
            code=$(curl -sS -L --retry 5 --retry-delay 10 --retry-all-errors -o /dev/null -w '%{http_code}' "$url")
            if [ "$code" = "200" ]; then
              echo "OK   $url ($code)"
            else
              echo "FAIL $url ($code)"
              fail=1
            fi
          done
          exit $fail
